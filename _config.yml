title: "Felix Reichelt"
description: "PhD candidate (Genetic Epidemiology, UMCG). Gene × stress exposure and response in relation to cardiometabolic health."
repository: "FelixReichelt13/FelixReichelt13.github.io"

# keep it simple so Pages can build
markdown: kramdown
highlighter: rouge
timezone: Europe/Amsterdam

# make sure Jekyll picks up _pages and ignores the template README
include:
  - _pages
exclude:
  - README.md
  - docs
  - google_scholar_crawler
  - Gemfile
  - Gemfile.lock

# safe plugins supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-seo-tag

kramdown:
  input: GFM
