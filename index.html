<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Felix Reichelt</title>
  <meta name="description" content="PhD candidate in Genetic Epidemiology at UMCG. Genetic liability, stress exposure, and cardiometabolic health.">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fff; color: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; }
    main { width: min(980px, calc(100% - 40px)); margin: 40px auto 80px; }
    img { max-width: 100%; height: auto; }
    h1, h2, h3 { line-height: 1.25; margin-top: 1.5em; }
    h1, h2 { border-bottom: 1px solid #d0d7de; padding-bottom: .3em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    small { color: #656d76; font-weight: 600; letter-spacing: .02em; }
    .paper-links { margin: .35rem 0 .8rem; }
    blockquote { margin-left: 0; padding-left: 1rem; border-left: 4px solid #d0d7de; color: #57606a; }
    code { background: #f6f8fa; padding: .2em .4em; border-radius: 4px; }
    @media (max-width: 640px) { main { width: min(100% - 24px, 980px); margin-top: 20px; } img[alt="Felix Reichelt"] { float: none !important; display: block; margin: 0 auto 1rem !important; } }
  </style>
</head>
<body>
  <main id="content">Loading profile…</main>
  <script>
    fetch('README.md', { cache: 'no-store' })
      .then(response => {
        if (!response.ok) throw new Error(`README load failed: ${response.status}`);
        return response.text();
      })
      .then(markdown => {
        document.getElementById('content').innerHTML = marked.parse(markdown);
      })
      .catch(error => {
        document.getElementById('content').innerHTML = `<h1>Felix Reichelt</h1><p>${error.message}</p>`;
      });
  </script>
</body>
</html>
