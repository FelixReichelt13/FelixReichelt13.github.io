name: Pages diagnostic
on: pull_request
permissions:
  contents: read
  pages: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Pages and live site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for p in pages pages/builds/latest; do curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$GITHUB_REPOSITORY/$p"; echo; done
          curl -sSI "https://${GITHUB_REPOSITORY_OWNER}.github.io/"
          curl -sS "https://${GITHUB_REPOSITORY_OWNER}.github.io/" | head -c 5000
